name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.9.0", "22", "24"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"

      - name: enable corepack
        run: |
          corepack enable
          corepack prepare yarn@4.11.0 --activate

      - name: cache yarn dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/cache
          key: ${{ runner.os }}-node${{ matrix.node-version }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-yarn-

      - name: Replace local file/portal dep with npm version for CI
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const dep = p.devDependencies['@quonfig/react'];
            if (dep && (dep.startsWith('file:') || dep.startsWith('portal:') || dep.startsWith('link:'))) {
              p.devDependencies['@quonfig/react'] = p.peerDependencies['@quonfig/react'] || '>=0.0.13';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install modules
        run: yarn install --no-immutable

      - name: Run formatter
        run: yarn prettier:check

      - name: Type-check
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
