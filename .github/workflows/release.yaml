name: Release Package
on:
  push:
    branches: [main]
jobs:
  test:
    uses: ./.github/workflows/test.yml

  check-version:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      current-version: ${{ steps.check.outputs.current-version }}
      is-prerelease: ${{ steps.check.outputs.is-prerelease }}
      npm-tag: ${{ steps.check.outputs.npm-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check if version needs publishing
        id: check
        run: |
          current_version=$(jq -r '.version' package.json)
          package_name=$(jq -r '.name' package.json)
          echo "current-version=$current_version" >> $GITHUB_OUTPUT
          if npm view "${package_name}@${current_version}" version 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          if [[ "$current_version" =~ -(alpha|beta|rc|dev|pre|canary|next) ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
            echo "npm-tag=$(echo "$current_version" | cut -d'-' -f2)" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
            echo "npm-tag=latest" >> $GITHUB_OUTPUT
          fi

  build-and-publish:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack (yarn 4)
        run: corepack enable
      - name: Replace local file/portal dep with npm version for CI
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const dep = p.devDependencies['@quonfig/react'];
            if (dep && (dep.startsWith('file:') || dep.startsWith('portal:') || dep.startsWith('link:'))) {
              p.devDependencies['@quonfig/react'] = p.peerDependencies['@quonfig/react'] || '>=0.0.13';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
      - run: yarn install --no-immutable
      - run: yarn build
      - name: Get npm publish token via OIDC
        id: npm-token
        run: |
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | jq -r '.value')
          PACKAGE_NAME=$(jq -r '.name' package.json | sed 's|/|%2F|g' | sed 's|@|%40|g')
          NPM_TOKEN=$(curl -sf -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${PACKAGE_NAME}" \
            | jq -r '.token')
          echo "::add-mask::$NPM_TOKEN"
          echo "token=$NPM_TOKEN" >> $GITHUB_OUTPUT
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-token.outputs.token }}
        run: |
          if [ "${{ needs.check-version.outputs.is-prerelease }}" == "true" ]; then
            npm publish --access public --tag ${{ needs.check-version.outputs.npm-tag }}
          else
            npm publish --access public
          fi
