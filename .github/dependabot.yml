version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 5
    ignore:
      # @quonfig/react is wired as a yarn `portal:` dep pointing at the
      # sibling ../sdk-react checkout, which only exists inside the
      # monorepo. Dependabot's updater runs in an isolated single-repo
      # container, so it cannot resolve the portal manifest — every npm
      # update job fails with `dependency_file_not_resolvable`
      # ("Manifest not found"). The portal link is a local workspace
      # pointer, never an upgradeable npm package, so excluding it is
      # correct.
      - dependency-name: "@quonfig/react"
